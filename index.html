:root{--bg:#0b0f17;--s1:#131928;--s2:#1c2438;--border:#243048;--gold:#f0c040;--blue:#3b82f6;--red:#ef4444;--green:#22c55e;--muted:#5a7090;--text:#e8f0ff;--r:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Inter',sans-serif;color:var(--text);display:flex;flex-direction:column;height:100dvh}
header{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 14px 0;flex-shrink:0}
.logo{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;color:var(--gold);letter-spacing:1px;margin-bottom:8px}
.logo span{color:var(--text)}
nav{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.tab{font-family:'Oswald',sans-serif;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:7px 13px;border-radius:8px 8px 0 0;border:none;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(240,192,64,.06)}
main{flex:1;overflow:hidden}
.view{display:none;height:100%;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.view.active{display:block}
.view::-webkit-scrollbar{width:3px}
.view::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px}
.sl{font-family:'Oswald',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.sw{position:sticky;top:0;z-index:10;background:var(--bg);padding-bottom:8px}
.sb{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.sb:focus{border-color:var(--gold)}
.sb::placeholder{color:var(--muted)}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.tb{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:all .15s;color:var(--text)}
.tb:hover{border-color:var(--gold);background:rgba(240,192,64,.07)}
.tb .fl{font-size:22px;display:block;margin-bottom:3px}
.tb .nm{font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;line-height:1.2}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sf2{font-size:32px}
.sn{font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;text-transform:uppercase}
.bb{margin-left:auto;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:5px 11px;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;flex-shrink:0}
.pl{font-family:'Oswald',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin:10px 0 5px}
.pr{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--s1);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;cursor:pointer;transition:border-color .15s}
.pr:hover{border-color:var(--blue)}
.pav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid var(--border)}
.pav.gk{background:rgba(240,192,64,.15);border-color:rgba(240,192,64,.4)}
.pav.def{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.35)}
.pav.mid{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3)}
.pav.fwd{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35)}
.pi{flex:1;min-width:0}
.pname{font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbadge{font-size:10px;font-weight:600;padding:1px 5px;border-radius:5px;margin-right:3px}
.bg{background:rgba(240,192,64,.15);color:var(--gold)}
.bb2{background:rgba(59,130,246,.12);color:var(--blue)}
.br2{background:rgba(239,68,68,.12);color:var(--red)}

.pdetail{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.pdflag{font-size:40px;margin-bottom:4px}
.pdav{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 10px;border:2px solid var(--border)}
.pdav.gk{background:rgba(240,192,64,.15);border-color:rgba(240,192,64,.5)}
.pdav.def{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.4)}
.pdav.mid{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4)}
.pdav.fwd{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4)}
.pdname{font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;text-transform:uppercase;line-height:1.1;text-align:center}
.pdpos{font-size:12px;color:var(--muted);text-align:center;margin-top:3px}
.pdstats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:12px}
.pdstat{background:var(--bg);border-radius:8px;padding:7px 4px;text-align:center}
.pdsl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;line-height:1.2}
.pdsv{font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;margin-top:2px;color:var(--gold)}
.ir{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(36,48,72,.6);font-size:13px;gap:8px}
.ir:last-child{border-bottom:none}
.il{color:var(--muted);flex-shrink:0}
.iv{text-align:right;font-size:12px}

.mc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}
.mm{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}

.mpl{background:rgba(59,130,246,.15);color:var(--blue)}
.md2{font-size:10px;color:var(--muted)}

.mfl{font-size:20px}
.mtn{font-family:'Oswald',sans-serif;font-weight:600;font-size:12px;text-align:center;line-height:1.2}
.msc{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;text-align:center;min-width:52px}
.msct{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;color:var(--gold)}
.mvc{font-size:10px;color:var(--muted);text-align:center;margin-top:4px}

.st th:nth-child(2){text-align:left}
.st td{padding:8px 5px;font-size:12px;text-align:center;border-bottom:1px solid rgba(36,48,72,.4)}
.st td:nth-child(2){text-align:left}

.q1{color:var(--gold)}.q2{color:var(--blue)}.q3{color:var(--green)}

.tn{font-family:'Oswald',sans-serif;font-weight:600;font-size:12px}
.fb{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px}

.fp.active{background:rgba(59,130,246,.15);border-color:var(--blue);color:var(--blue)}

.bmn{font-size:10px;color:var(--muted);margin-bottom:6px;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

.bt{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:var(--s2)}
.bt.win{background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.3)}

.stp{background:rgba(59,130,246,.15);color:var(--blue)}

function posEmoji(pos){return pos==="gk"?"🧤":pos==="def"?"🛡️":pos==="mid"?"⚙️":"⚽"}
function posLabel(pos){return pos==="gk"?"Keeper":pos==="def"?"Verdediger":pos==="mid"?"Middenvelder":"Aanvaller"}

// ---- SEARCH ----
function doSearch(q){
  q=q.trim().toLowerCase();
  const el=document.getElementById('sr');
  if(q.length<2){el.innerHTML='<div class="empty">Typ een naam om te zoeken</div>';return;}
  let res=[];
  for(const[country,sq] of Object.entries(SQ)){
    if(!sq.gk)continue;
    if(country.toLowerCase().includes(q))res.push({type:'c',country});
    for(const pos of ['gk','def','mid','fwd']){
      (sq[pos]||[]).forEach(p=>{
        if(p[0].toLowerCase().includes(q))res.push({type:'p',name:p[0],club:p[1],age:p[2],caps:p[3],goals:p[4],country,pos});
      });
    }
  }
  if(!res.length){el.innerHTML='<div class="empty">Niets gevonden voor "'+q+'"</div>';return;}
  let h='';
  const cs=res.filter(r=>r.type==='c'),ps=res.filter(r=>r.type==='p');
  if(cs.length){
    h+='<div class="sl">Landen ('+cs.length+')</div>';
    cs.forEach(r=>{h+=`<div class="pr" onclick="showSquad('${r.country}')"><span style="font-size:22px">${F(r.country)}</span><div class="pi"><div class="pname">${r.country}</div><div class="psub">Bekijk volledige selectie →</div></div></div>`;});
  }
  if(ps.length){
    h+='<div class="sl">Spelers ('+ps.length+')</div>';
    ps.forEach(r=>{
      const pc=posClass(r.pos);
      h+=`<div class="pr" onclick="showPlayer(${JSON.stringify(r).replace(/"/g,'&quot;')})">
        <div class="pav ${pc}">${posEmoji(r.pos)}</div>
        <div class="pi">
          <div class="pname">${r.name}</div>
          <div class="psub">${F(r.country)} ${r.country} · ${r.club}</div>
        </div>
        <div style="text-align:right;font-size:11px;color:var(--muted);flex-shrink:0">
          <div style="color:var(--gold);font-weight:700">${r.goals}⚽</div>
          <div>${r.caps} caps</div>
        </div>
      </div>`;
    });
  }
  el.innerHTML=h;
}

// ---- RESULTS STORAGE (localStorage) ----
const STORE_KEY='wk2026_results_v1';
let RESULTS={}; // {matchKey: {hs, as}}
function loadResults(){
  try{const r=localStorage.getItem(STORE_KEY);if(r)RESULTS=JSON.parse(r);}catch(e){RESULTS={};}
}
function saveResults(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(RESULTS));}catch(e){}
}
// Match key: groep "G:A:0" (groep A wedstrijd index 0), KO "K:73"
function gKey(gId,idx){return 'G:'+gId+':'+idx;}
function kKey(id){return 'K:'+id;}

// Pas opgeslagen uitslagen toe op de datastructuren
function applyResults(){
  // Groepswedstrijden
  for(const[gId,g] of Object.entries(GR)){
    g.m.forEach((m,idx)=>{
      const k=gKey(gId,idx);
      if(RESULTS[k]){m.hs=RESULTS[k].hs;m.as=RESULTS[k].as;}
      else{m.hs=null;m.as=null;}
    });
  }
  // KO wedstrijden
  [...R32,...QF,...SF,...FIN].forEach(m=>{
    const k=kKey(m.id);
    if(RESULTS[k]){m.hs=RESULTS[k].hs;m.as=RESULTS[k].as;}
    else{m.hs=null;m.as=null;}
  });
  // Vul KO teams in op basis van groepsstanden + KO winnaars
  resolveBracket();
}

// ---- STANDINGS ----
function calcStd(gId){
  const g=GR[gId],pts={},st={};
  g.t.forEach(t=>{pts[t]=0;st[t]={p:0,w:0,d:0,l:0,gf:0,ga:0};});
  g.m.forEach(m=>{
    if(m.hs===null)return;
    const[h,a,hs,as]=[m.h,m.a,m.hs,m.as];
    st[h].p++;st[a].p++;st[h].gf+=hs;st[h].ga+=as;st[a].gf+=as;st[a].ga+=hs;
    if(hs>as){st[h].w++;pts[h]+=3;st[a].l++;}else if(hs<as){st[a].w++;pts[a]+=3;st[h].l++;}else{st[h].d++;st[a].d++;pts[h]++;pts[a]++;}
  });
  return g.t.map(t=>({t,...st[t],pts:pts[t],gd:st[t].gf-st[t].ga})).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}
// Is groep volledig gespeeld?
function groupDone(gId){return GR[gId].m.every(m=>m.hs!==null);}
// Geef team op positie (1 of 2) in groep, mits beslist
function groupSlot(gId,pos){
  if(!groupDone(gId))return null;
  const std=calcStd(gId);
  return std[pos-1]?std[pos-1].t:null;
}

// ---- BRACKET RESOLUTION ----
// Placeholder -> echt team. Bewaart originele aanduiding.
function resolvePlaceholder(ph){
  // "1A" of "2B" => groepsslot
  let m=ph.match(/^([12])([A-L])\*?$/);
  if(m){const pos=+m[1],gId=m[2];const t=groupSlot(gId,pos);return t;}
  // "W73" => winnaar match 73
  m=ph.match(/^W(\d+)$/);
  if(m){return koWinner(+m[1]);}
  // "V97" => verliezer match 97 (voor 3e plaats)
  m=ph.match(/^V(\d+)$/);
  if(m){return koLoser(+m[1]);}
  // "3A/B/C..." => beste derde, niet automatisch
  return null;
}
function findKO(id){return [...R32,...QF,...SF,...FIN].find(m=>m.id===id);}
function koWinner(id){
  const m=findKO(id);if(!m||m.hs===null)return null;
  const ht=m._hTeam||resolvePlaceholder(m.h);const at=m._aTeam||resolvePlaceholder(m.a);
  if(m.hs>m.as)return ht;if(m.as>m.hs)return at;return null; // gelijk = onbeslist (penalties onbekend)
}
function koLoser(id){
  const m=findKO(id);if(!m||m.hs===null)return null;
  const ht=m._hTeam||resolvePlaceholder(m.h);const at=m._aTeam||resolvePlaceholder(m.a);
  if(m.hs>m.as)return at;if(m.as>m.hs)return ht;return null;
}
// Vul _hTeam/_aTeam in voor alle KO matches (meerdere passes voor doorstroming)
function resolveBracket(){
  for(let pass=0;pass<5;pass++){
    [...R32,...QF,...SF,...FIN].forEach(m=>{
      m._hTeam=resolvePlaceholder(m.h);
      m._aTeam=resolvePlaceholder(m.a);
    });
  }
}

function initGroups(){
  document.getElementById('gf').innerHTML='ABCDEFGHIJKL'.split('').map((g,i)=>`<button class="fp${i===0?' active':''}" onclick="showGroup('${g}',this)">Groep ${g}</button>`).join('');
  showGroup('A');
}
function showGroup(gId,btn){
  if(btn){document.querySelectorAll('#gf .fp').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  const g=GR[gId],std=calcStd(gId);
  let h=`<div class="sl">Stand Groep ${gId}${groupDone(gId)?' · beslist':''}</div><div class="card" style="padding:0;overflow:hidden;margin-bottom:10px"><table class="st"><thead><tr><th>#</th><th>Team</th><th>Sp</th><th>W</th><th>G</th><th>V</th><th>DS</th><th>Pnt</th></tr></thead><tbody>`;
  std.forEach((r,i)=>{const pc=i===0?'q1':i===1?'q2':i===2?'q3':'';h+=`<tr><td><span class="sp ${pc}">${i+1}</span></td><td><div class="tc" onclick="showSquad('${r.t}','groups')" style="cursor:pointer"><span class="tf2">${F(r.t)}</span><span class="tn">${r.t}</span></div></td><td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td><td style="color:${r.gd>0?'var(--green)':r.gd<0?'var(--red)':'var(--muted)'}">${r.gd>0?'+':''}${r.gd}</td><td style="font-weight:700;color:var(--gold)">${r.pts}</td></tr>`;});
  h+=`</tbody></table></div><div class="sl">Wedstrijden Groep ${gId}</div>`;
  g.m.forEach((m,idx)=>{h+=rMC(m,false,gKey(gId,idx));});
  h+=`<div style="margin-top:6px;padding:8px;background:var(--s1);border:1px solid var(--border);border-radius:8px;font-size:10px;color:var(--muted)"><span style="color:var(--gold)">●</span> 1e+2e = direct door · <span style="color:var(--green)">●</span> 3e = mogelijke wildcard (8 beste derdes)</div>`;
  document.getElementById('gI').innerHTML=h;
}

// ---- MATCH CARD ----
// m=wedstrijd, ko=knockout?, key=opslagsleutel (voor invulbaar maken)
function rMC(m,ko=false,key=null){
  const pl=m.hs!==null;
  // Bepaal weergavenamen
  let hName=m.h,aName=m.a,hReal=m.h,aReal=m.a,hPh='',aPh='';
  if(ko){
    hReal=m._hTeam||null;aReal=m._aTeam||null;
    hPh=m.h;aPh=m.a; // originele aanduiding (1A, W73...)
    hName=hReal||m.h;aName=aReal||m.a;
  }
  const iph=ko&&!hReal;const ipa=ko&&!aReal;
  const timeStr=m.t?`<span style="font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold);font-size:13px">${m.t}</span> <span style="color:var(--muted);font-size:10px">NL</span>`:'';
  const hCanClick=!iph&&SQ[hName]&&SQ[hName].gk;
  const aCanClick=!ipa&&SQ[aName]&&SQ[aName].gk;
  const hClick=hCanClick?`onclick="showSquad('${hName}','schedule')" style="cursor:pointer"`:'';
  const aClick=aCanClick?`onclick="showSquad('${aName}','schedule')" style="cursor:pointer"`:'';
  const hUnder=hCanClick?'border-bottom:1px dashed rgba(240,192,64,.4)':'';
  const aUnder=aCanClick?'border-bottom:1px dashed rgba(240,192,64,.4)':'';
  // Plek-badge voor KO
  const hBadge=ko?`<span style="font-size:9px;color:var(--muted);display:block">${hPh}</span>`:'';
  const aBadge=ko?`<span style="font-size:9px;color:var(--muted);display:block">${aPh}</span>`:'';
  // Score of invulknop
  let scoreBox;
  if(pl){
    scoreBox=`<div class="msc" ${key?`onclick="openEdit('${key}','${(hName||'').replace(/'/g,"\\\\'")}','${(aName||'').replace(/'/g,"\\\\'")}')" style="cursor:pointer"`:''}><div class="msct">${m.hs} – ${m.as}</div></div>`;
  } else if(key){
    scoreBox=`<div class="msc" onclick="openEdit('${key}','${(hName||'').replace(/'/g,"\\\\'")}','${(aName||'').replace(/'/g,"\\\\'")}')" style="cursor:pointer;border-color:var(--gold)"><div style="font-size:10px;color:var(--gold);font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase">Invullen</div>${m.t?`<div style="font-size:10px;margin-top:2px">${timeStr}</div>`:''}</div>`;
  } else {
    scoreBox=`<div class="msc"><div class="msct">– –</div>${m.t?`<div style="font-size:11px;margin-top:2px">${timeStr}</div>`:''}</div>`;
  }
  return `<div class="mc"><div class="mm"><span class="ms ${pl?'mf':'mpl'}">${pl?'Gespeeld':'Gepland'}</span>${m.lb?`<span class="mlb">${m.lb}</span>`:''}<span class="md2">${m.d||''}</span></div><div class="mtt"><div class="mti" ${hClick}><span class="mfl">${iph?'🏳️':F(hName)}</span><span class="mtn" style="${hUnder}">${hName}</span>${hBadge}</div>${scoreBox}<div class="mti" ${aClick}><span class="mfl">${ipa?'🏳️':F(aName)}</span><span class="mtn" style="${aUnder}">${aName}</span>${aBadge}</div></div>${m.v?`<div class="mvc">📍 ${m.v}</div>`:''}</div>`;
}

      <button onclick="saveEdit('${key}')" style="flex:2;padding:12px;background:var(--gold);color:#000;border:none;border-radius:10px;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;cursor:pointer;text-transform:uppercase">Opslaan</button>

  </div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeEdit();});
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById('edH').focus(),100);
}
function closeEdit(){const o=document.getElementById('editOverlay');if(o)o.remove();}
function saveEdit(key){
  const hs=parseInt(document.getElementById('edH').value);
  const as=parseInt(document.getElementById('edA').value);
  if(isNaN(hs)||isNaN(as)||hs<0||as<0){alert('Vul beide scores in (0 of hoger).');return;}
  RESULTS[key]={hs,as};
  saveResults();applyResults();closeEdit();refreshAll();
}
function clearEdit(key){
  delete RESULTS[key];saveResults();applyResults();closeEdit();refreshAll();
}
function refreshAll(){
  showSchedule(currentScheduleRound);
  showResults();
  // Herrender de actieve groep (onthoud welke)
  const gActive=document.querySelector('#gf .fp.active');
  let gId='A';
  if(gActive){const t=gActive.textContent.replace(/[^A-L]/g,'');if(t)gId=t;}
  showGroup(gId);
  // Markeer actieve groepknop opnieuw
  document.querySelectorAll('#gf .fp').forEach(b=>{b.classList.toggle('active',b.textContent.replace(/[^A-L]/g,'')===gId);});
  initBracket();
}

// ---- SCHEDULE (chronologisch, alleen nog te spelen) ----
let currentScheduleRound='alles';
// Bouw chronologisch gesorteerde lijst van alle wedstrijden
function allMatchesSorted(){
  const MA={jun:6,jul:7};
  let arr=[];
  for(const[gId,g] of Object.entries(GR)){
    g.m.forEach((m,idx)=>arr.push({...m,_key:gKey(gId,idx),_ko:false,_group:'Groep '+gId}));
  }
  R32.forEach(m=>arr.push({...m,_key:kKey(m.id),_ko:true,_group:'Ronde van 32'}));
  QF.forEach(m=>arr.push({...m,_key:kKey(m.id),_ko:true,_group:'Kwartfinale'}));
  SF.forEach(m=>arr.push({...m,_key:kKey(m.id),_ko:true,_group:'Halve finale'}));
  FIN.forEach(m=>arr.push({...m,_key:kKey(m.id),_ko:true,_group:m.lb||'Finale'}));
  // Sorteer op datum+tijd
  function dateVal(m){
    const dc=(m.d||'').replace(/^[a-z]+ /,''); // "14 jun"
    const parts=dc.split(' ');const day=parseInt(parts[0])||0;const mon=MA[parts[1]]||6;
    const t=(m.t||'00:00').split(':');const hh=parseInt(t[0])||0;const mm=parseInt(t[1])||0;
    return mon*100000+day*1000+hh*10+mm/10;
  }
  arr.sort((a,b)=>dateVal(a)-dateVal(b));
  return arr;
}

function initSchedule(){
  showSchedule('alles');
}

function showSchedule(round){
  currentScheduleRound=round||'alles';
  const all=allMatchesSorted();
  // Alleen nog te spelen (hs===null)
  const todo=all.filter(m=>m.hs===null);
  let h='';
  h+=`<div style="padding:10px 12px;background:rgba(240,192,64,.06);border:1px solid rgba(240,192,64,.2);border-radius:10px;margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.5">
    📝 Tik op een wedstrijd om de <strong style="color:var(--gold)">uitslag in te vullen</strong>. Gespeelde wedstrijden verschuiven naar <strong style="color:var(--text)">Uitslagen</strong> en standen + knock-outs werken automatisch bij.
  </div>`;
  if(todo.length===0){
    h+='<div class="empty">Alle wedstrijden zijn gespeeld! 🏆</div>';
    document.getElementById('scI').innerHTML=h;return;
  }
  // Groepeer per dag
  const byDay={};
  todo.forEach(m=>{const dk=m.d||'Nog te bepalen';if(!byDay[dk])byDay[dk]=[];byDay[dk].push(m);});
  for(const[day,ms] of Object.entries(byDay)){
    h+=`<div class="sl">${day}</div>`;
    ms.forEach(m=>{h+=rMC(m,m._ko,m._key);});
  }
  document.getElementById('scI').innerHTML=h;
}

// ---- RESULTS VIEW (gespeeld, nieuwste eerst) ----
function showResults(){
  const all=allMatchesSorted();
  const done=all.filter(m=>m.hs!==null).reverse();
  let h='';
  if(done.length===0){
    h='<div class="empty">Nog geen uitslagen.<br><span style="font-size:12px">Vul uitslagen in via het Schema-tabblad.</span></div>';
    document.getElementById('resI').innerHTML=h;return;
  }
  h+=`<div class="sl">${done.length} gespeelde wedstrijd${done.length>1?'en':''}</div>`;
  // Groepeer per dag
  const byDay={};
  done.forEach(m=>{const dk=m.d||'?';if(!byDay[dk])byDay[dk]=[];byDay[dk].push(m);});
  for(const[day,ms] of Object.entries(byDay)){
    h+=`<div style="font-size:11px;font-family:'Oswald',sans-serif;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 5px">${day}</div>`;
    ms.forEach(m=>{h+=rMC(m,m._ko,m._key);});
  }
  document.getElementById('resI').innerHTML=h;
}

// ---- BRACKET ----
function initBracket(){
  let h='';
  h+=`<div style="padding:8px 12px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:10px;margin-bottom:12px;font-size:11px;color:var(--muted);line-height:1.5">
    🔮 De bracket vult zich automatisch op basis van jouw uitslagen. Plek-aanduiding (1A, W73) blijft zichtbaar naast het ingevulde land.
  </div>`;
  [{lb:'Ronde van 32',ms:R32},{lb:'Kwartfinales',ms:QF},{lb:'Halve Finales',ms:SF},{lb:'Finale & 3e/4e Plaats',ms:FIN}].forEach(({lb,ms})=>{
    h+=`<div class="br-round"><div class="br-title">${lb}</div>`;
    ms.forEach(m=>{
      const ht=m._hTeam||m.h, at=m._aTeam||m.a;
      const hReal=!!m._hTeam, aReal=!!m._aTeam;
      const pl=m.hs!==null,hw=pl&&m.hs>m.as,aw=pl&&m.as>m.hs;
      h+=`<div class="bm"><div class="bmn">${m.lb||'Match '+m.id} · ${m.d||''} · ${m.v||''}</div><div class="bts">
        <div class="bt${hw?' win':''}"><span class="btf">${hReal?F(ht):'🏳️'}</span><span class="btn2">${ht}${hReal&&ht!==m.h?` <span style="font-size:9px;color:var(--muted)">(${m.h})</span>`:''}</span>${pl?`<span class="bts2">${m.hs}</span>`:''}</div>
        <div class="bt${aw?' win':''}"><span class="btf">${aReal?F(at):'🏳️'}</span><span class="btn2">${at}${aReal&&at!==m.a?` <span style="font-size:9px;color:var(--muted)">(${m.a})</span>`:''}</span>${pl?`<span class="bts2">${m.as}</span>`:''}</div>
      </div></div>`;
    });
    h+='</div>';
  });
  document.getElementById('brI').innerHTML=h;
}

// ---- INIT ----
loadResults();
applyResults();
renderSqList();
initGroups();
initSchedule();
showResults();
initBracket();

</script>
